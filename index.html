<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1"
  />

  <title>Trilingual Explanation</title>

  <style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    font-family:
      Arial,
      "Microsoft YaHei",
      "Noto Sans SC",
      sans-serif;
  }

  body {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 28px 20px;
    overflow: auto;

    /* 小学太空主题背景 */
    background:
      radial-gradient(
        circle at 8% 18%,
        rgba(255, 255, 255, 0.95) 0 3px,
        transparent 4px
      ),
      radial-gradient(
        circle at 20% 72%,
        rgba(255, 255, 255, 0.85) 0 2px,
        transparent 3px
      ),
      radial-gradient(
        circle at 86% 24%,
        rgba(255, 255, 255, 0.95) 0 3px,
        transparent 4px
      ),
      radial-gradient(
        circle at 92% 78%,
        rgba(255, 255, 255, 0.8) 0 2px,
        transparent 3px
      ),
      radial-gradient(
        circle at 12% 82%,
        rgba(255, 221, 105, 0.42) 0 70px,
        transparent 72px
      ),
      radial-gradient(
        circle at 88% 14%,
        rgba(174, 223, 255, 0.7) 0 90px,
        transparent 92px
      ),
      radial-gradient(
        circle at 82% 88%,
        rgba(213, 193, 255, 0.45) 0 95px,
        transparent 98px
      ),
      linear-gradient(
        180deg,
        #dff5ff 0%,
        #f3fbff 48%,
        #fff8d9 100%
      );
  }

  /* 左上角装饰星球 */
  body::before {
    content: "";
    position: fixed;
    top: 28px;
    left: 38px;
    width: 78px;
    height: 78px;
    border-radius: 50%;
    background:
      linear-gradient(
        160deg,
        #ffcf4a 0%,
        #ff9d3b 48%,
        #ff7452 100%
      );
    box-shadow:
      0 8px 18px rgba(0, 0, 0, 0.12),
      24px 12px 0 -28px #ffffff;
    opacity: 0.9;
    pointer-events: none;
  }

  /* 右下角装饰圆形 */
  body::after {
    content: "";
    position: fixed;
    right: 42px;
    bottom: 30px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background:
      radial-gradient(
        circle at 35% 30%,
        #ffffff 0 7px,
        transparent 8px
      ),
      linear-gradient(
        145deg,
        #73d8c1,
        #45bda8
      );
    opacity: 0.75;
    pointer-events: none;
  }

  .popup {
    position: relative;
    z-index: 1;
    width: min(88%, 620px);
    background:
      linear-gradient(
        180deg,
        #ffffff 0%,
        #fffef7 100%
      );
    border: 4px solid #65aee8;
    border-radius: 24px;
    padding: 32px 34px 28px;
    box-shadow:
      0 12px 30px rgba(47, 91, 130, 0.24),
      0 3px 0 rgba(255, 255, 255, 0.9) inset;
  }

  /* 卡片上方彩色装饰条 */
  .popup::before {
    content: "";
    position: absolute;
    top: -14px;
    left: 42px;
    right: 42px;
    height: 19px;
    border-radius: 20px;
    background:
      linear-gradient(
        90deg,
        #ffcf4a 0 25%,
        #ff7c73 25% 50%,
        #62cdb7 50% 75%,
        #7ab8ff 75% 100%
      );
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
  }

  .title {
    display: inline-block;
    margin: 0 0 22px;
    padding: 7px 16px;
    color: #ffffff;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.2;
    background:
      linear-gradient(
        135deg,
        #ff645f,
        #ef3f48
      );
    border-radius: 13px;
    box-shadow: 0 5px 10px rgba(239, 63, 72, 0.2);
  }

  .language-row {
    display: grid;
    grid-template-columns: 1fr 58px;
    gap: 18px;
    align-items: center;
    margin-bottom: 16px;
    padding: 14px 16px;
    border: 2px solid #e1edf5;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.88);
  }

  .language-row:nth-of-type(1) {
    border-left: 8px solid #ffcb4d;
  }

  .language-row:nth-of-type(2) {
    border-left: 8px solid #67cdb8;
  }

  .language-row:nth-of-type(3) {
    border-left: 8px solid #72aef5;
  }

  .language-row:last-child {
    margin-bottom: 0;
  }

  .label {
    margin-bottom: 5px;
    color: #2f4052;
    font-size: 17px;
    font-weight: 800;
  }

  .text {
    color: #3f4650;
    font-size: 19px;
    line-height: 1.4;
    white-space: pre-line;
  }

  .audio-button {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    padding: 0;
    border: 4px solid #ffffff;
    border-radius: 50%;
    background:
      linear-gradient(
        145deg,
        #6f7b91,
        #525d72
      );
    color: #ffffff;
    font-size: 22px;
    cursor: pointer;
    box-shadow:
      0 5px 10px rgba(34, 54, 79, 0.28),
      0 0 0 2px #dce7f1;
    transition:
      transform 0.15s ease,
      box-shadow 0.15s ease;
  }

  .audio-button:hover {
    transform: scale(1.06);
    box-shadow:
      0 7px 14px rgba(34, 54, 79, 0.3),
      0 0 0 3px #cde5fa;
  }

  .audio-button:active {
    transform: scale(0.94);
  }

  .audio-button:focus-visible {
    outline: 4px solid rgba(255, 202, 69, 0.8);
    outline-offset: 3px;
  }

  .error {
    color: #b00020;
    font-size: 17px;
    line-height: 1.5;
  }

  @media (max-width: 600px) {
    body {
      align-items: flex-start;
      padding: 25px 12px;
    }

    body::before {
      top: 12px;
      left: 12px;
      width: 52px;
      height: 52px;
    }

    body::after {
      right: 10px;
      bottom: 12px;
      width: 60px;
      height: 60px;
    }

    .popup {
      width: 100%;
      padding: 27px 17px 18px;
      border-width: 3px;
      border-radius: 19px;
    }

    .popup::before {
      left: 25px;
      right: 25px;
      height: 15px;
    }

    .title {
      margin-bottom: 17px;
      padding: 6px 13px;
      font-size: 22px;
    }

    .language-row {
      grid-template-columns: 1fr 50px;
      gap: 10px;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 13px;
    }

    .label {
      font-size: 16px;
    }

    .text {
      font-size: 17px;
    }

    .audio-button {
      width: 47px;
      height: 47px;
      font-size: 20px;
    }
  }

  @media (max-width: 360px) {
    .language-row {
      grid-template-columns: 1fr 44px;
    }

    .audio-button {
      width: 42px;
      height: 42px;
      font-size: 18px;
    }
  }
</style>
</head>

<body>
  <main class="popup" id="popup">
    <h1 class="title" id="title"></h1>

    <section class="language-row">
      <div>
        <div class="label">Bahasa Melayu:</div>
        <div class="text" id="bmText"></div>
      </div>

      <button
        class="audio-button"
        type="button"
        data-language="bm"
        aria-label="Mainkan audio Bahasa Melayu"
      >
        ▶
      </button>
    </section>

    <section class="language-row">
      <div>
        <div class="label">中文：</div>
        <div class="text" id="zhText"></div>
      </div>

      <button
        class="audio-button"
        type="button"
        data-language="zh"
        aria-label="播放中文音频"
      >
        ▶
      </button>
    </section>

    <section class="language-row">
      <div>
        <div class="label">English:</div>
        <div class="text" id="enText"></div>
      </div>

      <button
        class="audio-button"
        type="button"
        data-language="en"
        aria-label="Play English audio"
      >
        ▶
      </button>
    </section>
  </main>

  <script src="JS/data.js"></script>

  <script>
    "use strict";

    const params = new URLSearchParams(window.location.search);
    const contentId = params.get("id");
    const item = window.POPUP_DATA?.[contentId];

    const popup = document.getElementById("popup");
    const buttons = document.querySelectorAll(".audio-button");

    let currentAudio = null;
    let currentButton = null;

    function stopAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }

      if (currentButton) {
        currentButton.textContent = "▶";
        currentButton = null;
      }
    }

    function showError(message) {
      popup.innerHTML = `<div class="error"></div>`;
      popup.querySelector(".error").textContent = message;
    }

    if (!contentId) {
      showError("没有提供内容 ID。");
    } else if (!item) {
      showError(`找不到内容：${contentId}`);
    } else {
      document.getElementById("title").textContent = item.title;
      document.getElementById("bmText").textContent = item.bm;
      document.getElementById("zhText").textContent = item.zh;
      document.getElementById("enText").textContent = item.en;

      buttons.forEach((button) => {
        const language = button.dataset.language;
        const source = item.audio?.[language];

        if (!source) {
          button.hidden = true;
          return;
        }

        button.addEventListener("click", async () => {
          if (
            currentAudio &&
            currentButton === button &&
            !currentAudio.paused
          ) {
            currentAudio.pause();
            button.textContent = "▶";
            return;
          }

          stopAudio();

          currentAudio = new Audio(source);
          currentButton = button;
          button.textContent = "■";

          currentAudio.addEventListener("ended", stopAudio);
          currentAudio.addEventListener("error", () => {
            stopAudio();
            alert("音频无法播放，请检查文件名称和路径。");
          });

          try {
            await currentAudio.play();
          } catch (error) {
            stopAudio();
            alert("浏览器暂时无法播放这个音频。");
            console.error(error);
          }
        });
      });
    }

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopAudio();
      }
    });

    window.addEventListener("pagehide", stopAudio);
  </script>
</body>
</html>
